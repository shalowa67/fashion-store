<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Fashion Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .contact-section {
      padding: 4rem 0;
      background: var(--background-light);
    }
    
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
    }
    
    .contact-info {
      background: white;
      padding: 2rem;
      border-radius: 12px;
    }
    
    .contact-info h3 {
      margin-bottom: 1.5rem;
    }
    
    .info-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .info-item i {
      width: 40px;
      height: 40px;
      background: var(--background-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-color);
    }
    
    .contact-form {
      background: white;
      padding: 2rem;
      border-radius: 12px;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-family: inherit;
    }
    
    .form-group textarea {
      resize: vertical;
    }
    
    .btn-submit {
      width: 100%;
      padding: 1rem;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .btn-submit:hover {
      background: var(--accent-color);
    }
    
    @media (max-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <!-- Same navbar as index.html -->
  </nav>

  <main>
    <section class="contact-section">
      <div class="container">
        <div class="section-header">
          <h2>Get in Touch</h2>
          <p>We'd love to hear from you</p>
        </div>
        
        <div class="contact-grid">
          <div class="contact-info">
            <h3>Contact Information</h3>
            <div class="info-item">
              <i class="fas fa-map-marker-alt"></i>
              <div>
                <strong>Address</strong>
                <p>Plot 42, Cairo Road, Lusaka, Zambia</p>
              </div>
            </div>
            <div class="info-item">
              <i class="fas fa-phone"></i>
              <div>
                <strong>Phone</strong>
                <p>+260 973 239408</p>
              </div>
            </div>
            <div class="info-item">
              <i class="fas fa-envelope"></i>
              <div>
                <strong>Email</strong>
                <p>bristolshalowa@gmail.com</p>
              </div>
            </div>
            <div class="info-item">
              <i class="fas fa-clock"></i>
              <div>
                <strong>Business Hours</strong>
                <p>Mon-Fri: 9:00 AM - 6:00 PM<br>Sat: 10:00 AM - 4:00 PM</p>
              </div>
            </div>
          </div>
          
          <div class="contact-form">
            <h3>Send Us a Message</h3>
            <form id="contactForm">
              <div class="form-group">
                <input type="text" id="name" placeholder="Your Name" required>
              </div>
              <div class="form-group">
                <input type="email" id="email" placeholder="Your Email" required>
              </div>
              <div class="form-group">
                <select id="subject">
                  <option value="General Inquiry">General Inquiry</option>
                  <option value="Product Question">Product Question</option>
                  <option value="Order Status">Order Status</option>
                  <option value="Returns">Returns</option>
                </select>
              </div>
              <div class="form-group">
                <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
              </div>
              <button type="submit" class="btn-submit">Send Message</button>
            </form>
            <div id="formMessage" style="margin-top: 1rem; text-align: center;"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <!-- Same footer as index.html -->
  </footer>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        subject: document.getElementById('subject').value,
        message: document.getElementById('message').value
      };
      
      const submitBtn = e.target.querySelector('button');
      const messageDiv = document.getElementById('formMessage');
      
      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';
        
        await api.submitContact(formData);
        
        messageDiv.style.color = 'green';
        messageDiv.innerHTML = '✅ Message sent successfully! We will get back to you soon.';
        document.getElementById('contactForm').reset();
      } catch (error) {
        messageDiv.style.color = 'red';
        messageDiv.innerHTML = '❌ Failed to send message. Please try again.';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Message';
        
        setTimeout(() => {
          messageDiv.innerHTML = '';
        }, 5000);
      }
    });
  </script>
</body>
</html>
