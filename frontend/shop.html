<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Fashion Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-tshirt"></i>
        <span>Fashion Store</span>
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html" class="active">Shop</a>
        <a href="contact.html">Contact</a>
        <a href="#" id="accountLink">Account</a>
      </div>
      <div class="nav-icons">
        <a href="cart.html" class="cart-icon">
          <i class="fas fa-shopping-bag"></i>
          <span class="cart-count" id="cartCount">0</span>
        </a>
        <div class="auth-buttons">
          <a href="login.html" class="btn-login" id="loginBtn">Login</a>
          <a href="signup.html" class="btn-signup" id="signupBtn">Sign Up</a>
          <a href="#" class="btn-logout" id="logoutBtn" style="display: none;">Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <section class="shop-products">
      <div class="container">
        <div class="section-header">
          <h2>All Products</h2>
          <p>Discover our complete collection</p>
        </div>
        
        <div class="shop-filters">
          <select id="categoryFilter" class="filter-select">
            <option value="">All Categories</option>
            <option value="stoles">Stoles</option>
            <option value="scarves">Scarves</option>
            <option value="wraps">Wraps</option>
            <option value="accessories">Accessories</option>
          </select>
          
          <select id="sortFilter" class="filter-select">
            <option value="newest">Newest First</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
          </select>
        </div>
        
        <div class="products-grid" id="productsGrid">
          <!-- Products will be loaded here -->
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <!-- Same footer as index.html -->
  </footer>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/shop.js"></script>
</body>
</html>
