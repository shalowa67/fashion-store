
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Fashion Online Store</title>
  <link rel="stylesheet" href="sign.css">
</head>
<body>

  <header>
    <nav>
      <a href="index.html">Home</a>
    </nav>
  </header>

  <main>
    <section class="signup-container">
      <h2>Create Account</h2>
      <form action="/signup" method="post" onsubmit="return validateEmails()">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Full Name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Email Address" required>

        <label for="confirmEmail">Confirm Email</label>
        <input type="email" id="confirmEmail" name="confirmEmail" placeholder="Confirm Email" required>

        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Username" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password" required oninput="checkStrength(this.value)">
        <div class="strength" id="strengthMessage"></div>

        <button type="submit">Sign Up</button>
      </form>

      <aside class="login-link">
        <p>Already have an account? <a href="login page.html">Login here</a></p>
      </aside>
    </section>
  </main>

  <script>
    function validateEmails() {
      const email = document.getElementById("email").value;
      const confirmEmail = document.getElementById("confirmEmail").value;
      if (email !== confirmEmail) {
        alert("Emails do not match.");
        return false;
      }
      return true;
    }

    function checkStrength(password) {
      const strengthMessage = document.getElementById("strengthMessage");
      let strength = "Weak";
      let color = "red";

      const strongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
      const mediumRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{6,}$/;

      if (strongRegex.test(password)) {
        strength = "Strong";
        color = "green";
      } else if (mediumRegex.test(password)) {
        strength = "Medium";
        color = "orange";
      }

      strengthMessage.textContent = `Password Strength: ${strength}`;
      strengthMessage.style.color = color;
    }
  </script>

</body>
</html>
